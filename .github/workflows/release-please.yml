name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Reads release-please-config.json + .release-please-manifest.json.
      # On Conventional Commits to main it maintains a release PR; merging it
      # bumps the version (incl. the JSON manifests), tags v<x.y.z>, and
      # publishes the GitHub Release with generated notes.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
